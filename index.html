<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rebirth Car Coating Center — Reception</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;min-height:100vh;padding:12px}
.app{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;overflow:hidden;width:100%;max-width:720px;margin:0 auto;box-shadow:0 2px 16px rgba(0,0,0,.08)}
.body{min-height:540px}
.card{background:#f8fafc;border:0.5px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:500;color:#475569}
.req{color:#C41010;margin-left:2px}
.inp{border:0.5px solid #cbd5e1;border-radius:8px;padding:12px 14px;font-size:15px;font-family:inherit;background:#fff;color:#111;width:100%;min-height:50px}
.inp:focus{outline:none;border-color:#C41010;box-shadow:0 0 0 3px rgba(196,16,16,.1)}
.card-num-input{border:2.5px solid #d97706;border-radius:8px;padding:14px;font-size:20px;font-weight:700;letter-spacing:2px;background:#fff!important;color:#111!important;-webkit-text-fill-color:#111!important;width:100%;min-height:56px;text-align:center;font-family:inherit;margin-bottom:14px}
.card-num-input::placeholder{color:#d97706;opacity:.6;font-weight:400;letter-spacing:0}
.btn-r{background:#C41010;color:#fff;border:none;border-radius:8px;padding:13px 24px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;min-height:50px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-r:hover,.btn-r:active{background:#a50e0e}
.btn-r:disabled{opacity:.5;cursor:not-allowed}
.btn-g{background:none;border:0.5px solid #cbd5e1;border-radius:8px;padding:13px 20px;font-size:15px;cursor:pointer;color:#64748b;font-family:inherit;min-height:50px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-g:hover{background:#f1f5f9}
.btn-amber{background:#d97706;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-green{background:#16a34a;color:#fff;border:none;border-radius:10px;padding:16px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;min-height:56px;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn-del{background:none;border:2px solid #dc2626;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;color:#dc2626;font-family:inherit;min-height:50px;display:flex;align-items:center;justify-content:center;gap:6px;width:100%}
.btn-del-y{background:#dc2626;color:#fff;border:none;border-radius:8px;padding:13px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;min-height:50px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-sm{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:5px;padding:10px 0;min-height:44px;font-family:inherit}
.acts{display:flex;justify-content:space-between;align-items:center}
.steps{display:flex;align-items:flex-start;margin-bottom:22px}
.sdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.sline{flex:1;height:2px;margin:0 6px;margin-top:14px}
.scol{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.slbl{font-size:10px;margin-top:4px;white-space:nowrap}
.svc-item{border:2px solid #e2e8f0;border-radius:10px;margin-bottom:9px;overflow:hidden}
.svc-item.on{border-color:#C41010}
.svc-item.on-prepaid{border-color:#d97706!important}
.svc-row{padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;background:#fff;min-height:52px;-webkit-tap-highlight-color:transparent;user-select:none}
.svc-item.on .svc-row{background:#fff5f5}
.svc-item.on-prepaid .svc-row{background:#fffbeb!important}
.svc-chk{width:24px;height:24px;border-radius:5px;border:2.5px solid #94a3b8;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.svc-item.on .svc-chk{border-color:#C41010;background:#C41010}
.svc-item.on-prepaid .svc-chk{border-color:#d97706!important;background:#d97706!important}
.svc-n{font-size:15px;color:#111}
.svc-item.on .svc-n{font-weight:600;color:#C41010}
.svc-item.on-prepaid .svc-n{font-weight:600;color:#d97706!important}
.svc-opts{padding:12px 14px 16px;background:#fff5f5;border-top:1px solid #fca5a5;display:flex;flex-wrap:wrap;gap:9px}
.card-inp-sec{border:2.5px solid #d97706;border-radius:12px;background:#fffbeb;padding:18px;margin-top:12px}
.pay-sec{border:2px solid #16a34a;border-radius:12px;background:#f0fdf4;padding:18px;margin-top:14px}
.crow{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid #e2e8f0}
.clbl{font-size:12px;color:#94a3b8;min-width:110px;flex-shrink:0;padding-top:1px}
.cval{font-size:14px;font-weight:500;color:#111}
.dvdr{height:0.5px;background:#e2e8f0;margin:14px 0}
.av{border-radius:50%;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.visit-blk{padding:14px 0;border-bottom:0.5px solid #e2e8f0}
.visit-blk:last-child{border-bottom:none}
.errbox{background:#fef2f2;color:#dc2626;padding:12px 14px;border-radius:8px;font-size:14px;margin-bottom:12px}
.stag{display:inline-block;font-size:13px;padding:5px 12px;border-radius:6px;background:#f0fdf4;color:#16a34a;margin:0 5px 6px 0}
.tb{padding:14px 18px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.tb-ok{background:#f0fdf4;color:#16a34a}
.tb-err{background:#fef2f2;color:#dc2626}
.cxrow{display:flex;align-items:center;padding:14px;border:0.5px solid #e2e8f0;border-radius:10px;cursor:pointer;margin-bottom:9px;background:#fff;gap:12px;min-height:74px;-webkit-tap-highlight-color:transparent}
.cxrow:active{border-color:#C41010}
.hcard{cursor:pointer;text-align:center;padding:26px 18px;border:0.5px solid #e2e8f0;border-radius:12px;background:#fff}
.hcard:active{border-color:#C41010}
.hico{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 13px}
.bv{background:#eff6ff;color:#3b82f6;font-size:12px;padding:3px 9px;border-radius:12px;display:inline-block}
.sec{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.del-banner{background:#fef2f2;border:2px solid #fca5a5;border-radius:12px;padding:20px;margin-top:14px;text-align:center}
.card-amber{background:#fffbeb;border:2.5px solid #d97706;border-radius:12px;padding:18px;margin-bottom:14px}
@media print{button{display:none!important}body{background:#fff;padding:0}
.app{border:none;box-shadow:none;max-width:100%;margin:0}
#receipt-box{border:none!important;box-shadow:none!important;max-width:100%!important;margin:0!important;padding:10px!important}}
</style>
</head>
<body>
<div class="app">
<div style="background:#fff;border-top:5px solid #C41010">
<div style="padding:12px 22px 8px;display:flex;align-items:center;gap:14px">
<svg width="46" height="46" viewBox="0 0 46 46" fill="none">
<circle cx="23" cy="23" r="20" stroke="#111" stroke-width="2.5"/>
<circle cx="23" cy="23" r="7.5" stroke="#111" stroke-width="2"/>
<line x1="23" y1="3" x2="23" y2="15.5" stroke="#111" stroke-width="2.2"/>
<line x1="23" y1="30.5" x2="23" y2="43" stroke="#111" stroke-width="2.2"/>
<line x1="3" y1="23" x2="15.5" y2="23" stroke="#111" stroke-width="2.2"/>
<line x1="30.5" y1="23" x2="43" y2="23" stroke="#111" stroke-width="2.2"/>
<line x1="8.5" y1="8.5" x2="17" y2="17" stroke="#111" stroke-width="1.7"/>
<line x1="29" y1="29" x2="37.5" y2="37.5" stroke="#111" stroke-width="1.7"/>
<line x1="37.5" y1="8.5" x2="29" y2="17" stroke="#111" stroke-width="1.7"/>
<line x1="17" y1="29" x2="8.5" y2="37.5" stroke="#111" stroke-width="1.7"/>
<circle cx="23" cy="3" r="4.5" fill="#C41010"/>
<circle cx="23" cy="3" r="1.8" fill="white"/>
</svg>
<div>
<div style="font-style:italic;font-weight:900;font-size:30px;color:#111;letter-spacing:-1px;line-height:1;font-family:Georgia,serif">REB<span style="color:#C41010">i</span>RTH</div>
<div style="background:#C41010;color:#fff;font-size:9px;font-weight:700;letter-spacing:.25em;padding:3px 9px;display:inline-block;margin-top:4px;font-style:italic">CAR COATING CENTER</div>
</div>
</div>
<div style="height:4px;background:#C41010"></div>
</div>
<div class="body" id="body"></div>
</div>
<script>
'use strict';
let _submitting = false;
// ═══════════════════════════════════════════════════════════
//  REBIRTH CAR COATING CENTER — Reception System v2.0
// ═══════════════════════════════════════════════════════════

const R = '#C41010';
const STAFF = ['Nicole','Diane','Jho'];
const PAY_METHODS = ['Cash','Credit Card','GCash (Acct 1)','GCash (Acct 2)','Bank Transfer'];

const SVC = [
  {id:'ppf_motec', n:'PPF — Motec',            opts:['6.5mil','7.5mil','8.5mil']},
  {id:'ppf_stek',  n:'PPF — STEK',             opts:['DYNO','FORCE']},
  {id:'cer',       n:'Ceramic coating',         opts:['Budget','Standard','Premium','Super Premium']},
  {id:'gra',       n:'Graphene coating',        opts:['Budget','Standard','Premium','Super Premium']},
  {id:'dia',       n:'Diamond coating',         opts:['Standard','Premium','Super Premium']},
  {id:'tit',       n:'Titanium coating',        opts:['Standard','Premium','Super Premium']},
  {id:'g15',       n:'15H Ceramic guard',       opts:['Standard','Premium','Super Premium']},
  {id:'pnt',       n:'Paint & body repair',     opts:['Panel','Washover & Coating','Washover & PPF']},
  {id:'tnt',       n:'Tint',                    opts:['Action','Smart','Nex']},
  {id:'wnd',       n:'Windshield protection',   opts:[]},
  {id:'abc',       n:'Anti-bacterial coating',  opts:[]},
  {id:'ppm',       n:'PPF maintenance',         opts:[]},
  {id:'cem',       n:'Coating maintenance',     opts:[]},
  {id:'prepaid',   n:'Maintenance Prepaid Card',opts:[]},
];

const ms   = () => SVC.map(s => ({id:s.id, on:false, opt:''}));
const td   = () => new Date().toISOString().split('T')[0];
const esc  = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') : '';
const fmt  = n => n ? '₱' + parseFloat(n).toLocaleString('en-PH',{minimumFractionDigits:2}) : '₱0.00';
const initPay = () => ({
  est:'', dep:'', depMeth:'', depStaff:'', depDate:td(), depNote:'',
  final:'', payMeth:'', payStaff:'', payNote:'', payDate:'', status:'pending',
  signature:'', signedAt:''
});

const pill    = (lbl,on,fn,sz=13) => `<button onclick="${fn}" style="padding:9px 18px;border-radius:24px;font-size:${sz}px;cursor:pointer;border:2.5px solid ${on?R:'#cbd5e1'};background:${on?R:'#fff'};color:${on?'#fff':'#64748b'};font-weight:${on?700:400};font-family:inherit;min-height:46px">${lbl}</button>`;
const optPill = (lbl,on,fn) => `<button onclick="${fn}" style="padding:9px 20px;border-radius:24px;font-size:14px;cursor:pointer;border:3px solid ${on?R:'#cbd5e1'};background:${on?R:'#fff'};color:${on?'#fff':'#64748b'};font-weight:${on?800:400};font-family:inherit;min-height:48px">${on?'✓ ':''}${lbl}</button>`;

// ── Storage ──────────────────────────────────────────────────────────────────
const store = {
  get: async k => { try { const v=localStorage.getItem('rbc_'+k); return v?{value:v}:null; } catch{ return null; } },
  set: async (k,v) => { try { localStorage.setItem('rbc_'+k,v); } catch{} }
};

// ── App State ─────────────────────────────────────────────────────────────────
let S = {
  scr: 'home', cx: [], url: '',
  f:  {fn:'',ln:'',p1:'',p2:'',p3:'',dt:td(),st:'',addr:'',email:'',mdl:'',col:'',plt:'',svd:td(),svs:ms(),m1:'',m2:'',m3:'',prepaidNum:'',confirmedCard:'',prepaidUsedInit:0,pay:initPay()},
  vf: {svd:td(),st:'',svs:ms(),m1:'',m2:'',m3:'',useCard:false,newCardNum:'',confirmedCard:'',pay:initPay()},
  ef: {fn:'',ln:'',p1:'',p2:'',p3:'',addr:'',email:'',mdl:'',col:'',plt:'',prepaidNum:'',prepaidUsed:0},
  pf: initPay(), payVidx: null, depInfo: null,
  sel:null, prevScr:'ret', sb:'ln', sq:'', res:[],
  lq:'', ls:'name', lStaff:'all',
  pw:'', pwErr:false, confirmDel:false, savedInfo:null,
  toast:null, err:'', busy:false, syncing:false
};

(async () => {
  try { const r=await store.get('cx'); if(r) S.cx=JSON.parse(r.value); } catch{}
  try { const r=await store.get('url'); if(r) S.url=r.value; } catch{}
  render();
})();

// ── Helper functions ──────────────────────────────────────────────────────────
const saveCx   = async () => { try { await store.set('cx', JSON.stringify(S.cx)); } catch{} };
const go       = s => { S.scr=s; S.err=''; S.confirmDel=false; render(); };
const flash    = (msg,t='ok') => { S.toast={msg,t}; render(); setTimeout(()=>{ S.toast=null; render(); }, 3500); };
const sf       = (k,v) => { S.f[k]=v; };
const svf      = (k,v) => { S.vf[k]=v; };
const sef      = (k,v) => { S.ef[k]=v; };
const spf      = (k,v) => { S.f.pay[k]=v; };
const svpf     = (k,v) => { S.vf.pay[k]=v; };
const ppf      = (k,v) => { S.pf[k]=v; };
const getSvcs  = svs => svs.filter(s=>s.on).map(s => { const d=SVC.find(x=>x.id===s.id); return d.n+(s.opt?' ('+s.opt+')':''); });
const crow     = (l,v) => v ? '<div class="crow"><span class="clbl">'+l+'</span><span class="cval">'+esc(v)+'</span></div>' : '';

function tog(i, isV) {
  const a = isV ? S.vf.svs : S.f.svs;
  a[i] = {...a[i], on:!a[i].on, opt:''};
  if (isV) {
    const ppm = S.vf.svs[SVC.findIndex(x=>x.id==='ppm')]?.on;
    const cem = S.vf.svs[SVC.findIndex(x=>x.id==='cem')]?.on;
    if (!ppm && !cem) S.vf.useCard = false;
    if (SVC[i].id==='prepaid' && !a[i].on) { S.vf.newCardNum=''; S.vf.confirmedCard=''; }
  } else {
    if (SVC[i].id==='prepaid' && !a[i].on) { S.f.prepaidNum=''; S.f.confirmedCard=''; }
  }
  render();
}
function setOpt(i, o, isV) { const a=isV?S.vf.svs:S.f.svs; a[i]={...a[i],opt:a[i].opt===o?'':o}; render(); }
function openCx(id, from) { S.sel=S.cx.find(c=>c.id===id)||null; S.prevScr=from||'ret'; S.confirmDel=false; go('prof'); }
function openPwList() { S.pw=''; S.pwErr=false; go('pwList'); }
function openPwSettings() { S.pw=''; S.pwErr=false; go('pwSettings'); }
function checkPwSettings() {
  var el = document.getElementById('pw-set-inp');
  if ((el?el.value:S.pw) === 'rebirth') { S.pw=''; S.pwErr=false; go('settings'); }
  else { S.pwErr=true; if(el) el.value=''; S.pw=''; render(); }
}
function checkPw() {
  const el = document.getElementById('pw-inp');
  if ((el?el.value:S.pw) === 'rebirth') { S.pw=''; S.pwErr=false; S.lq=''; S.ls='name'; S.lStaff='all'; go('list'); }
  else { S.pwErr=true; if(el) el.value=''; S.pw=''; render(); }
}
function initEdit() {
  const c = S.sel; if(!c) return;
  S.ef = {fn:c.fn||'',ln:c.ln||'',p1:c.p1||'',p2:c.p2||'',p3:c.p3||'',addr:c.addr||'',email:c.email||'',mdl:c.mdl||'',col:c.col||'',plt:c.plt||'',prepaidNum:c.prepaidNum||'',prepaidUsed:c.prepaidUsed||0};
  go('edit');
}
async function deleteCustomer() {
  if(!S.sel) return;
  const nm = S.sel.fn+' '+S.sel.ln;
  S.cx = S.cx.filter(c=>c.id!==S.sel.id);
  await saveCx(); S.sel=null; S.confirmDel=false;
  flash(nm+' deleted.'); go(S.prevScr==='list'?'list':'home');
}
function doSearch() {
  const q = (S.sq||'').toLowerCase().trim();
  if (!q) { S.res=[]; render(); return; }
  S.res = S.cx.filter(c => {
    if (S.sb==='ln') return c.ln.toLowerCase().includes(q);
    if (S.sb==='p4') return c.p3===q;
    if (S.sb==='em') return (c.email||'').toLowerCase().includes(q);
    if (S.sb==='pl') return (c.plt||'').toLowerCase().replace(/\s/g,'').includes(q.replace(/\s/g,''));
    return false;
  });
  render();
}
function confirmCard(isV) {
  const el = document.getElementById(isV ? 'cinp-ret' : 'cinp-new');
  const val = (el ? el.value : '').trim();
  if (!val) { alert('Please enter a card number first.'); return; }
  if (isV) { S.vf.newCardNum=val; S.vf.confirmedCard=val; }
  else     { S.f.prepaidNum=val; S.f.confirmedCard=val; }
  render();
}

// ── Validation ────────────────────────────────────────────────────────────────
function val1() {
  if (!S.f.fn.trim()||!S.f.ln.trim()) { S.err='First and last name required.'; render(); return; }
  if (!S.f.p1||!S.f.p2||!S.f.p3)     { S.err='Phone number required.'; render(); return; }
  if (!S.f.st)                         { S.err='Select a staff member.'; render(); return; }
  S.err=''; go('new2');
}
function val3() {
  const sel = S.f.svs.filter(s=>s.on);
  if (!sel.length) { S.err='Select at least one service.'; render(); return; }
  const miss = sel.find(s => SVC.find(x=>x.id===s.id).opts.length>0 && !s.opt);
  if (miss) { S.err='Select a grade for: '+SVC.find(x=>x.id===miss.id).n; render(); return; }
  const ce = document.getElementById('cinp-new');
  if (ce && ce.value.trim()) S.f.prepaidNum = ce.value.trim();
  if (S.f.svs[SVC.findIndex(x=>x.id==='prepaid')]?.on && !S.f.prepaidNum.trim()) {
    S.err='Enter a card number and tap "Register card number".'; render(); return;
  }
  if (S.f.pay.dep && S.f.pay.depMeth && !S.f.pay.depNote) { S.err=refLabel(S.f.pay.depMeth)+' is required.'; render(); return; }
  S.err=''; go('newConf');
}
function valVf() {
  if (!S.vf.st) { S.err='Select a staff member.'; render(); return; }
  const sel = S.vf.svs.filter(s=>s.on);
  if (!sel.length) { S.err='Select at least one service.'; render(); return; }
  const miss = sel.find(s => SVC.find(x=>x.id===s.id).opts.length>0 && !s.opt);
  if (miss) { S.err='Select a grade for: '+SVC.find(x=>x.id===miss.id).n; render(); return; }
  const ce = document.getElementById('cinp-ret');
  if (ce && ce.value.trim()) S.vf.newCardNum = ce.value.trim();
  if (S.vf.svs[SVC.findIndex(x=>x.id==='prepaid')]?.on && !S.vf.newCardNum.trim()) {
    S.err='Enter a card number and tap "Register card number".'; render(); return;
  }
  if (S.vf.pay.dep && S.vf.pay.depMeth && !S.vf.pay.depNote) { S.err=refLabel(S.vf.pay.depMeth)+' is required.'; render(); return; }
  S.err=''; go('retConf');
}

// ── Google Sheets ─────────────────────────────────────────────────────────────
async function postToSheets(data) {
  if (!S.url) return;
  try {
    await fetch(S.url, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify(data)
    });
  } catch(e) { console.warn('Sheets sync:', e); }
}
async function pushToSheets() {
  if (!S.url) { flash('No URL configured.','err'); return; }
  S.syncing=true; render();
  try {
    await fetch(S.url, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify({type:'push_all', json:JSON.stringify(S.cx)})});
    S.syncing=false; flash(S.cx.length+' customers pushed to Sheets.');
  } catch { S.syncing=false; flash('Push failed. Check URL.','err'); }
  render();
}

// 自動バックアップ（サイレント）
async function silentPush() {
  if (!S.url) return;
  try {
    await fetch(S.url, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify({type:'push_all', json:JSON.stringify(S.cx)})
    });
  } catch(e) { console.warn('Auto backup:', e); }
}
async function pullFromSheets() {
  if (!S.url) { flash('No URL configured.','err'); return; }
  S.syncing=true; render();
  try {
    const r = await fetch(S.url+'?action=get', {headers:{'Content-Type':'text/plain'}});
    const d = await r.json();
    if (d.customers && Array.isArray(d.customers)) { S.cx=d.customers; await saveCx(); S.syncing=false; flash(d.customers.length+' customers loaded.'); }
    else throw 0;
  } catch { S.syncing=false; flash('Pull failed.','err'); }
  render();
}
async function saveUrl() { try { await store.set('url', S.url); } catch{} flash('URL saved.'); }

    svcs:v.svcs, date:v.date, staff:v.staff,

  if (vPay && vPay.dep && parseFloat(vPay.dep) > 0 && vPay.depMeth) {

// ── Payment completion ────────────────────────────────────────────────────────
async function completePayment() {
  if (_submitting) return;
  _submitting = true;
  document.querySelectorAll('.btn-r').forEach(function(b){b.disabled=true;b.style.opacity='0.5';});
  const c = S.sel; if(!c) { _submitting=false; return; }
  const vidx = S.payVidx;
  const v = (c.visits||[])[vidx]; if(!v) return;
  const p = v.pay || {};
  const pf = S.pf;
  const dep = parseFloat(p.dep||0);
  const fin = parseFloat(pf.final||p.est||0);
  const remain = Math.max(0, fin-dep);
  if (remain>0 && !pf.payMeth)   { S.err='Please select payment method.'; render(); return; }
  if (remain>0 && !pf.payStaff)  { S.err='Please select staff who received payment.'; render(); return; }
  if (remain>0 && !pf.payNote) { S.err=refLabel(pf.payMeth)+' is required.'; render(); return; }
  const now = new Date();
  const payDate = now.toISOString().split('T')[0];
  const payTime = now.toTimeString().slice(0,5);
  const updPay = {...p,
    final: pf.final||p.est,
    payMeth:  remain>0 ? pf.payMeth  : 'N/A (deposit covered)',
    payStaff: remain>0 ? pf.payStaff : (p.depStaff||''),
    payNote:  pf.payNote||'',
    payDate, payTime, status:'completed'
  };
  S.cx = S.cx.map(cx => {
    if (cx.id!==c.id) return cx;
    return {...cx, visits: cx.visits.map((vv,i) => i===vidx ? {...vv, pay:updPay} : vv)};
  });
  S.sel = S.cx.find(x=>x.id===c.id);
  await saveCx();
  await silentPush(); // 自動バックアップ
  await postToSheets({
    type:'payment', id:c.id,
    fn:c.fn||'', ln:c.ln||'', phone:c.phone||'',
    mdl:c.mdl||'', plt:c.plt||'',
    visitDate:v.date, services:(v.svcs||[]).join(', '),
    email:c.email||'', addr:c.addr||'',
    col:c.col||'',
    estimate:updPay.est||'', deposit:updPay.dep||'',
    depositMethod:updPay.depMeth||'',
    depositStaff:updPay.depStaff||'',
    depositNote:updPay.depNote||'',
    finalAmount:updPay.final||'', paymentMethod:updPay.payMeth||'',
    paymentStaff:updPay.payStaff||'',
    paymentNote:updPay.payNote||'',
    paymentDate:payDate
  });
  _submitting = false;
  flash('Payment completed! ✅');
  go('receipt');
}

function cardDots(used) {
  const dots = ['1','2','3','★'].map((d,i) => {
    const dn = i<used;
    return '<div style="width:36px;height:36px;border-radius:50%;border:2.5px solid '+(dn?'#d97706':'#fed7aa')+';background:'+(dn?'#d97706':'#fff7ed')+';display:flex;align-items:center;justify-content:center;font-size:'+(i===3?16:14)+'px;font-weight:700;color:'+(dn?'#fff':i===3?'#d97706':'#fdba74')+'">'+(dn?'✓':d)+'</div>';
  }).join('<div style="height:2.5px;flex:1;background:#fed7aa;align-self:center;margin:0 4px"></div>');
  const rem = 4-used;
  let st='', sc='#78350f';
  if (used>=4) { st='Card complete — purchase a new card'; sc='#dc2626'; }
  else if (used===3) { st='★ NEXT VISIT IS FREE!'; sc='#d97706'; }
  else st = rem+' visit'+(rem!==1?'s':'')+' remaining — visit 4 FREE';
  return '<div style="display:flex;align-items:center;margin-bottom:10px">'+dots+'</div><div style="font-size:14px;font-weight:'+(used>=3?700:500)+';color:'+sc+'">'+st+'</div>';
}

function refLabel(method) {
  if (!method) return 'Ref #';
  var m = method.toLowerCase();
  if (m.indexOf('gcash') >= 0) return 'GCash Ref #';
  if (m.indexOf('bank') >= 0) return 'Bank Ref #';
  if (m.indexOf('credit') >= 0 || m.indexOf('card') >= 0) return 'Card Ref #';
  return 'OR #';
}

// ── Signature functions ────────────────────────────────────────
function initSignature(canvasId) {
  var id = canvasId || 'sig-canvas';
  var canvas = document.getElementById(id);
  if (!canvas || canvas._initialized) return;
  canvas._initialized = true;
  canvas._id = id;
  var ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  var drawing = false;

  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    var touch = e.touches ? e.touches[0] : e;
    return {
      x: (touch.clientX - rect.left) * (canvas.width / rect.width),
      y: (touch.clientY - rect.top) * (canvas.height / rect.height)
    };
  }
  canvas.addEventListener('touchstart', function(e){
    e.preventDefault(); drawing=true;
    var p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y);
  },{passive:false});
  canvas.addEventListener('touchmove', function(e){
    e.preventDefault(); if(!drawing)return;
    var p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke();
  },{passive:false});
  canvas.addEventListener('touchend', function(){drawing=false;});
  canvas.addEventListener('mousedown', function(e){
    drawing=true; var p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y);
  });
  canvas.addEventListener('mousemove', function(e){
    if(!drawing)return; var p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke();
  });
  canvas.addEventListener('mouseup', function(){drawing=false;});
  canvas.addEventListener('mouseleave', function(){drawing=false;});
}

async function skipSignature() {
  var c = S.sel; if(!c) return;
  var vidx = S.payVidx!=null ? S.payVidx : (c.visits||[]).length-1;
  var now = new Date();
  var skipText = 'Skipped (online) ' + now.toISOString().split('T')[0];
  S.cx = S.cx.map(function(cx){
    if(cx.id!==c.id) return cx;
    return Object.assign({},cx,{visits:cx.visits.map(function(v,i){
      if(i!==vidx) return v;
      return Object.assign({},v,{pay:Object.assign({},v.pay,{signedAt:skipText})});
    })});
  });
  S.sel = S.cx.find(function(x){return x.id===c.id;});
  await saveCx();
  await silentPush();
  flash('Signature skipped.');
  render();
}
